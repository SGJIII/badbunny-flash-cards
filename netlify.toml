[build]
  command = "pnpm run build:netlify"
  publish = "out"

[build.environment]
  NODE_VERSION = "22.14.0"
  PNPM_VERSION = "11.9.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
